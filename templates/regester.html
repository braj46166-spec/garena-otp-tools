<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <h1>Create Account</h1>
        <div class="toggle-buttons">
            <button onclick="window.location.href='/'">🔑 Login</button>
            <button class="active">✨ Sign Up</button>
        </div>
        <form id="register-form" action="/register_user" method="POST">
            <input type="text" name="username" placeholder="USERNAME" required>
            <input type="password" name="password" placeholder="PASSWORD" required>
            <input type="password" name="confirm_password" placeholder="CONFIRM PASSWORD" required>
            <button type="submit" class="login-btn">✨ Sign Up</button>
        </form>

        <div id="register-status-box" class="status-box hidden">
            <p id="register-status-message">Ready to sign up...</p>
        </div>

        <div class="social">
            <button class="wa" onclick="window.location.href='https://wa.me/918709353461'">💬 WhatsApp</button>
            <a href="https://t.me/xnitehere" target="_blank" class="tg">✈️ Telegram</a>
        </div>
        <div class="contact">Contact for credits: 918709353461 | @xnitehere</div>
    </div>

    <script>
        const registerForm = document.getElementById('register-form');
        const registerStatusBox = document.getElementById('register-status-box');
        const registerStatusMessage = document.getElementById('register-status-message');

        function showRegisterStatus(message, isError = false) {
            registerStatusBox.classList.remove('hidden');
            registerStatusBox.classList.add('visible');
            registerStatusMessage.textContent = message;
            registerStatusBox.style.borderColor = isError ? 'rgba(248,113,113,0.35)' : 'rgba(34,197,94,0.35)';
        }

        registerForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            const formData = new FormData(registerForm);
            const body = new URLSearchParams(formData);

            showRegisterStatus('⏳ Sending registration...', false);

            try {
                const response = await fetch(registerForm.action, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json' },
                    body
                });

                const data = await response.json().catch(() => null);

                if (response.ok && data && data.status === 'success') {
                    showRegisterStatus('✅ Signup Successful! Redirecting to login...', false);
                    setTimeout(() => { window.location.href = '/'; }, 1400);
                    return;
                }

                // Show error message from server if available
                const errMsg = data && data.message ? data.message : 'Registration failed. Please try again.';
                showRegisterStatus('⚠️ ' + errMsg, true);
            } catch (error) {
                showRegisterStatus('⚠️ Request failed. ' + (error.message || ''), true);
            }
        });
    </script>
</body>
</html>
