<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card dashboard-card">
        <div class="header">
            <div>
                <h2>Dashboard</h2>
                <span class="user-name">{{ username }}</span>
            </div>
            <button class="logout-btn" onclick="window.location.href='/'">Logout</button>
        </div>

        <div class="credit-box">
            <p>AVAILABLE CREDITS</p>
            <h1>{{ credits }}</h1>
        </div>

        <form id="otp-form">
            <input type="email" name="email" placeholder="ENTER EMAIL ADDRESS" required>
            <input type="hidden" name="username" value="{{ username }}">
            <button type="submit" class="login-btn">🚀 Send Register Code (1 credit)</button>
        </form>

        <div id="status-box" class="status-box hidden">
            <p id="status-message">⌛ Ready to send...</p>
            <p><strong>Email:</strong> <span id="display-email"></span></p>
            <p><strong>API response:</strong> <span id="display-api-response"></span></p>
            <p><strong>Remaining credits:</strong> <span id="display-credits"></span></p>
        </div>

        <div class="social">
            <button class="wa" onclick="window.location.href='https://wa.me/918709353461'">💬 WhatsApp</button>
            <a href="https://t.me/xnitehere" target="_blank" class="tg">✈️ Telegram</a>
        </div>
        
        <div class="contact">
            Need credits? Contact: 918709353461 | @xnitehere
        </div>
    </div>

    <script>
        const form = document.getElementById('otp-form');
        const statusBox = document.getElementById('status-box');
        const statusMessage = document.getElementById('status-message');
        const displayEmail = document.getElementById('display-email');
        const displayApiResponse = document.getElementById('display-api-response');
        const displayCredits = document.getElementById('display-credits');
        const creditValue = document.querySelector('.credit-box h1');

        function showStatusBox() {
            statusBox.classList.remove('hidden');
        }

        function updateStatus(email, message, apiResponse, credits) {
            showStatusBox();
            statusMessage.textContent = message;
            displayEmail.textContent = email;
            displayApiResponse.textContent = apiResponse;
            displayCredits.textContent = typeof credits === 'number' ? credits : '-';
            if (typeof credits === 'number') {
                creditValue.textContent = credits;
            }
        }

        form.addEventListener('submit', async function(event) {
            event.preventDefault();
            const email = form.email.value.trim();
            const username = form.username.value;
            if (!email) return;

            statusMessage.textContent = '⏳ Sending...';
            showStatusBox();
            try {
                const response = await fetch('/send_code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Accept': 'application/json'
                    },
                    body: new URLSearchParams({ username, email })
                });
                const data = await response.json();
                const isSuccess = response.ok && data.status === 'success';
                const resultText = isSuccess ? 'Success' : 'Error';
                const apiResponse = data.api_response || data.message || (isSuccess ? 'Verification code sent successfully!' : 'Verification failed');
                const remainingCredits = typeof data['remaining credits'] === 'number'
                    ? data['remaining credits']
                    : typeof data.remaining_credits === 'number'
                        ? data.remaining_credits
                        : typeof data.new_credits === 'number'
                            ? data.new_credits
                            : undefined;

                updateStatus(data.email || email, resultText, apiResponse, remainingCredits);
            } catch (error) {
                updateStatus(email, 'Error', 'Request failed. Please try again.', undefined);
            }
        });
    </script>
</body>
</html>
