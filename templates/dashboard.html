<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card dashboard-card">
        <div class="header">
            <div>
                <h2>Dashboard</h2>
                <span class="user-name">{{ username }}</span>
            </div>
            <button class="logout-btn" onclick="window.location.href='/'">Logout</button>
        </div>

        <div class="credit-box">
            <p>AVAILABLE CREDITS</p>
            <h1>{{ credits }}</h1>
        </div>

        <form id="otp-form">
            <input type="email" name="email" placeholder="ENTER EMAIL ADDRESS" required>
            <input type="hidden" name="username" value="{{ username }}">
            <button type="submit" class="login-btn">🚀 Send Register Code (1 credit)</button>
        </form>

        <div id="status-box" class="status-box">
            ⌛ Ready to send...
        </div>

        <div class="social">
            <button class="wa" onclick="window.location.href='https://wa.me/918709353461'">💬 WhatsApp</button>
            <a href="https://t.me/xnitehere" target="_blank" class="tg">✈️ Telegram</a>
        </div>
        
        <div class="contact">
            Need credits? Contact: 918709353461 | @xnitehere
        </div>
    </div>

    <script>
        const form = document.getElementById('otp-form');
        const statusBox = document.getElementById('status-box');
        const creditValue = document.querySelector('.credit-box h1');

        form.addEventListener('submit', async function(event) {
            event.preventDefault();
            const email = form.email.value.trim();
            const username = form.username.value;
            if (!email) return;

            statusBox.textContent = '⏳ Sending...';
            try {
                const response = await fetch('/send_code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Accept': 'application/json'
                    },
                    body: new URLSearchParams({ username, email })
                });
                const data = await response.json();
                const isSuccess = response.ok && data.status === 'success';

                statusBox.textContent = data.message || (isSuccess ? '✅ Code sent successfully' : '⚠️ Failed to send code');
                if (typeof data.new_credits === 'number') {
                    creditValue.textContent = data.new_credits;
                }
            } catch (error) {
                statusBox.textContent = '⚠️ Request failed. Please try again.';
            }
        });
    </script>
</body>
</html>
