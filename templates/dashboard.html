<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .status-box {
            margin-top: 20px; padding: 20px;
            background: #1a1a1a; border: 1px solid #333;
            border-radius: 12px; color: #fff; text-align: left;
            min-height: 120px; /* Box hamesha visible rahega */
        }
        #display-email { color: #00d4ff; font-weight: bold; }
        #display-credits { color: #ffd700; font-weight: bold; font-size: 1.2em; }
        #status-message { font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card dashboard-card">
        <div class="header">
            <div>
                <h2>Dashboard</h2>
                <span class="user-name">{{ username }}</span>
            </div>
            <button class="logout-btn" onclick="window.location.href='/'">Logout</button>
        </div>

        <div class="credit-box">
            <p>AVAILABLE CREDITS</p>
            <h1>{{ credits }}</h1>
        </div>

        <form id="otp-form">
            <input type="email" name="email" id="email_input" placeholder="ENTER EMAIL ADDRESS" required>
            <input type="hidden" name="username" value="{{ username }}">
            <button type="submit" class="login-btn">🚀 Send Register Code (1 credit)</button>
        </form>

        <div id="status-box" class="status-box">
            <p id="status-message">⏳ Waiting for action...</p>
            <p>📧 Email: <span id="display-email">-</span></p>
            <p>💰 Remaining Credits: <span id="display-credits">-</span></p>
        </div>

        <div class="social">
            <button class="wa" onclick="window.location.href='https://wa.me/918709353461'">💬 WhatsApp</button>
            <a href="https://t.me/xnitehere" target="_blank" class="tg">✈️ Telegram</a>
        </div>
        
        <div class="contact">
            Need credits? Contact: 918709353461 | @xnitehere
        </div>
    </div>

    <script>
        const form = document.getElementById('otp-form');
        const statusMessage = document.getElementById('status-message');
        const displayEmail = document.getElementById('display-email');
        const displayCredits = document.getElementById('display-credits');
        const creditValue = document.querySelector('.credit-box h1');

        form.addEventListener('submit', async function(event) {
            event.preventDefault();
            const email = document.getElementById('email_input').value.trim();
            const username = document.querySelector('input[name="username"]').value;

            statusMessage.textContent = '⏳ Processing...';
            statusMessage.style.color = "#ffffff";

            try {
                const response = await fetch('/send_code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ username, email })
                });
                
                const data = await response.json();
                
                // Update UI Logic
                displayEmail.textContent = email;
                const remaining = data.remaining_credits ?? 'N/A';
                displayCredits.textContent = remaining;

                if (data.status === 'success') {
                    statusMessage.textContent = "✅ Success: " + (data.message || "Code sent successfully!");
                    statusMessage.style.color = "#4CAF50";
                    creditValue.textContent = remaining;
                } else {
                    statusMessage.textContent = "❌ Error: " + (data.message || "Failed to process");
                    statusMessage.style.color = "#FF5252";
                }
            } catch (error) {
                statusMessage.textContent = "⚠️ Error: Request failed.";
                statusMessage.style.color = "#FF5252";
            }
        });
    </script>
</body>
</html>
